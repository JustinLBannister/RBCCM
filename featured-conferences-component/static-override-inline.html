<!-- =========================================================================
     Featured Conferences (Tabbed Grid) - STATIC OVERRIDE, PURE INLINE STYLES
     =========================================================================
     Every element carries its style attribute. No <style> block, no class
     hooks needed, no dependency on featured-conferences.css. Highest CSS
     specificity, so host-page rules can't override.

     Responsive: uses flex-wrap on the row to flow 1 / 2 / 3 columns
     based on viewport (no @media queries, since inline styles can't
     declare them).

     To use: paste the entire <section>...</section> below wherever the
     component would render. To change events, edit the three <div>
     blocks inside the row.
     ========================================================================= -->

<section style="background:#EFF6FD;padding:40px 16px;" aria-label="Featured conferences">
  <div style="max-width:1100px;margin:0 auto;text-align:center;">

    <h2 style="color:#003168;font-family:'RBCDisplay',Georgia,Times,serif;font-size:24px;font-weight:500;line-height:normal;letter-spacing:-0.789px;margin:0 0 32px 0;display:inline-flex;align-items:center;gap:12px;justify-content:center;">
      <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" aria-hidden="true" style="color:#003168;flex-shrink:0;">
        <path d="M7 2v3M17 2v3M3 9h18M5 5h14a2 2 0 0 1 2 2v13a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
      <span>Featured conferences</span>
    </h2>

    <div style="display:flex;flex-wrap:wrap;justify-content:center;gap:30px;list-style:none;margin:0;padding:0;">
