<!DOCTYPE html-entities SYSTEM "http://www.interwoven.com/livesite/xsl/xsl-html.dtd">
<!-- Featured Conferences — Homepage variant
     ============================================
     Simple 3-up strip for the RBCCM homepage. Pulls from the same
     centralized Events List DCR as featured-conferences-events.html
     (the main component), but filters by per-event sitelocation
     checkbox (rbccm-homepage) instead of the event_featured flag.

     Filter:
       1. sitelocation contains 'rbccm-homepage'
       2. Sorted by event_date ascending, capped at 3
     No date safety net — flagged events stay until an author unflags
     them (consistent with the main featured-conferences component).

     TEMPORARY MARKUP NOTE
     ---------------------
     Markup matches the legacy homepage strip 1:1 (Bootstrap classes,
     inline styles, .lblue-circle/.event-date/.tile naming). This is so
     the existing site CSS for those classes picks it up unchanged.
     A BEM/no-Bootstrap rewrite is queued — see featured-conferences-homepage.css
     for the stubbed-out BEM rules that aren't currently used. -->
<xsl:stylesheet version="2.0" xmlns:xsl="http://www.w3.org/1999/XSL/Transform">
  <!-- Skin: default -->

  <xsl:output method="html" indent="no" />

  <xsl:include href="http://www.interwoven.com/livesite/xsl/HTMLTemplates.xsl" />
  <xsl:include href="http://www.interwoven.com/livesite/xsl/StringTemplates.xsl" />


  <!-- ============================================================
       PROPERTY VARIABLES
       ============================================================ -->
  <xsl:variable name="CFG_HEADING">
    <xsl:choose>
      <xsl:when test="normalize-space(/Properties/Datum[@ID='Heading']) != ''">
        <xsl:value-of select="normalize-space(/Properties/Datum[@ID='Heading'])" />
      </xsl:when>
      <xsl:otherwise>Featured conferences</xsl:otherwise>
    </xsl:choose>
  </xsl:variable>


  <!-- ============================================================
       DATE FORMATTER — converts YYYY-MM-DD into 3-letter month + day.
       Returns the day range when an end date is provided (e.g. 19-21).
       ============================================================ -->
  <xsl:template name="FORMAT_EVENT_DATE">
    <xsl:param name="start_date" />
    <xsl:param name="end_date" />

    <xsl:variable name="vMonth" select="number(substring-before(substring-after($start_date, '-'), '-'))" />
    <xsl:variable name="vDay"   select="number(substring-after(substring-after($start_date, '-'), '-'))" />
    <xsl:variable name="vEndDay" select="number(substring-after(substring-after($end_date, '-'), '-'))" />

    <span class="month">
      <xsl:choose>
        <xsl:when test="$vMonth = 1">Jan</xsl:when>
        <xsl:when test="$vMonth = 2">Feb</xsl:when>
        <xsl:when test="$vMonth = 3">Mar</xsl:when>
        <xsl:when test="$vMonth = 4">Apr</xsl:when>
        <xsl:when test="$vMonth = 5">May</xsl:when>
        <xsl:when test="$vMonth = 6">Jun</xsl:when>
        <xsl:when test="$vMonth = 7">Jul</xsl:when>
        <xsl:when test="$vMonth = 8">Aug</xsl:when>
        <xsl:when test="$vMonth = 9">Sep</xsl:when>
        <xsl:when test="$vMonth = 10">Oct</xsl:when>
        <xsl:when test="$vMonth = 11">Nov</xsl:when>
        <xsl:when test="$vMonth = 12">Dec</xsl:when>
      </xsl:choose>
    </span>
    <span class="day">
      <xsl:value-of select="$vDay" />
      <xsl:if test="normalize-space($end_date) != '' and $vEndDay != $vDay">
        <xsl:text>-</xsl:text>
        <xsl:value-of select="$vEndDay" />
      </xsl:if>
    </span>
  </xsl:template>


  <!-- ============================================================
       MAIN TEMPLATE
       ============================================================ -->
  <xsl:template match="/">

    <!-- All conference items in the centralized feed. Path is
         conferences/data (not events/event) for this component. -->
    <xsl:variable name="allEvents" select="/Properties/Data/Datum[@ID='EventsList' or @Name='Events List']/DCR/conferences/data" />

    <!-- Homepage events: sitelocation checkbox includes 'rbccm-homepage'. -->
    <xsl:variable name="homepageEvents" select="$allEvents[
        contains(string(sitelocation), 'rbccm-homepage')
      ]" />
    <xsl:variable name="homepageCount" select="count($homepageEvents)" />

    <!-- Debug marker (visible only in page source).
         total=0     → Events List DCR not binding to this component
         homepage=0  → binding OK but no event has rbccm-homepage flagged. -->
    <xsl:comment> rbccm-fc-homepage debug: total=<xsl:value-of select="count($allEvents)" /> homepage=<xsl:value-of select="$homepageCount" /> </xsl:comment>

    <xsl:if test="$homepageCount &gt; 0">

      <div id="featured-conferences">
        <div style="background-color:#EFF6FD; margin-bottom: 50px;" class="featured-conference-wrapper">
          <div class="container">
            <div class="conferences conferences-home text-center">

              <h2 style="display: none;">
                <img style="display:inline;margin-top: -8px;width: 39px;" src="/assets/rbccm/homepage/calendar.svg" alt="" aria-hidden="true" />
                <xsl:text>&#160;&#160;</xsl:text>
                <xsl:value-of select="$CFG_HEADING" />
              </h2>

              <div class="row">
                <xsl:for-each select="$homepageEvents">
                  <xsl:sort select="event_date" order="ascending" />
                  <xsl:if test="position() &lt;= 3">

                    <div class="col-xs-12 col-sm-4 tile" style="height: 238px;">

                      <div class="lblue-circle event-date" style="background-color: #ffffff;">
                        <p>
                          <xsl:call-template name="FORMAT_EVENT_DATE">
                            <xsl:with-param name="start_date" select="event_date" />
                            <xsl:with-param name="end_date" select="event_date_end" />
                          </xsl:call-template>
                        </p>
                      </div>

                      <xsl:if test="normalize-space(location) != ''">
                        <p class="location"><xsl:value-of select="location" /></p>
                      </xsl:if>

                      <p class="event-name">
                        <xsl:choose>
                          <xsl:when test="normalize-space(event_url) != ''">
                            <a>
                              <xsl:attribute name="href"><xsl:value-of select="event_url" disable-output-escaping="yes" /></xsl:attribute>
                              <xsl:value-of select="event_name" />
                            </a>
                          </xsl:when>
                          <xsl:otherwise>
                            <xsl:value-of select="event_name" />
                          </xsl:otherwise>
                        </xsl:choose>
                      </p>

                    </div>

                  </xsl:if>
                </xsl:for-each>
              </div>

            </div>
          </div>
        </div>
      </div>

    </xsl:if>

  </xsl:template>

</xsl:stylesheet>

<Properties ComponentID="">
  <Datum ID="Heading" Type="String" Name="Section heading (hidden by default, kept for SEO/a11y)">Featured conferences</Datum>
  <!-- Centralized Events List feed — same binding as the main
       featured-conferences-events.html. -->
  <Datum ID="EventsList" Type="DCR" Name="Events List"/>
</Properties>
